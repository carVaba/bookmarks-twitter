<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bookmarks Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.js"></script>

    <style>
        :root { 
            --bg-color: #f4f5f7; --card-bg: #ffffff; --text-main: #0f141e; --text-sub: #6b7280; 
            --accent: #111111; --featured-bg: linear-gradient(135deg, #0f141e 0%, #1a2235 100%);
            --modal-overlay: rgba(255, 255, 255, 0.4); --border-color: rgba(0,0,0,0.05);
            --shadow-sm: 0 4px 20px rgba(0,0,0,0.04); --shadow-lg: 0 20px 40px rgba(0,0,0,0.08);
            --danger: #ff3b30; /* Apple's native red */
        }
        
        @media (prefers-color-scheme: dark) {
            :root { 
                --bg-color: #0a0a0a; --card-bg: #141414; --text-main: #ffffff; --text-sub: #a1a1aa; 
                --accent: #ffffff; --featured-bg: linear-gradient(135deg, #1f1f1f 0%, #2d2d2d 100%);
                --modal-overlay: rgba(0, 0, 0, 0.6); --border-color: rgba(255,255,255,0.05);
                --shadow-sm: 0 4px 20px rgba(0,0,0,0.2); --shadow-lg: 0 20px 40px rgba(0,0,0,0.4);
            }
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", Helvetica, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; -webkit-font-smoothing: antialiased; }

        .header-container { max-width: 1200px; margin: 0 auto 40px auto; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        h1 { font-size: 3rem; font-weight: 800; letter-spacing: -1.5px; margin: 0; }
        .search-bar { width: 100%; max-width: 500px; padding: 16px 24px; border-radius: 30px; border: 1px solid var(--border-color); background-color: var(--card-bg); color: var(--text-main); font-size: 18px; box-shadow: var(--shadow-sm); outline: none; transition: all 0.3s ease; }
        .search-bar:focus { box-shadow: var(--shadow-lg); transform: translateY(-2px); }

        .featured-container { max-width: 1200px; margin: 0 auto 40px auto; }
        .featured-title { font-size: 14px; font-weight: 700; color: var(--text-sub); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; }
        .featured-card { background: var(--featured-bg); border-radius: 32px; padding: 40px; color: white; text-decoration: none; display: flex; flex-direction: column; box-shadow: var(--shadow-lg); transition: transform 0.2s; }
        .featured-card:active { transform: scale(0.98); }
        .featured-author { font-size: 20px; font-weight: 800; margin-bottom: 10px; }
        .featured-content { font-size: 24px; line-height: 1.4; font-weight: 500; letter-spacing: -0.5px; }

        .tabs-container { display: flex; overflow-x: auto; gap: 12px; padding: 10px 0 30px 0; max-width: 1200px; margin: 0 auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .tabs-container::-webkit-scrollbar { display: none; }
        .tab-btn { background: var(--card-bg); color: var(--text-main); border: 1px solid var(--border-color); padding: 10px 20px; border-radius: 24px; font-size: 15px; font-weight: 700; cursor: pointer; white-space: nowrap; box-shadow: var(--shadow-sm); transition: all 0.2s ease; }

        .toolbar { display: flex; flex-wrap: wrap; gap: 15px; max-width: 1200px; margin: 0 auto 30px auto; background: var(--card-bg); padding: 15px 24px; border-radius: 24px; box-shadow: var(--shadow-sm); border: 1px solid var(--border-color); align-items: center; justify-content: space-between; }
        .tool-group { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .tool-label { font-size: 13px; font-weight: 700; color: var(--text-sub); text-transform: uppercase; }
        .tool-input, .tool-select { padding: 8px 14px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-main); font-size: 14px; outline: none; font-weight: 600; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; max-width: 1200px; margin: 0 auto; }
        
        /* Changed from anchor to div styling */
        .card { position: relative; background-color: var(--card-bg); border-radius: 28px; padding: 28px; cursor: pointer; transition: transform 0.3s ease, box-shadow 0.3s; display: flex; flex-direction: column; justify-content: space-between; box-shadow: var(--shadow-sm); border: 1px solid var(--border-color); }
        .card:hover { transform: translateY(-5px); box-shadow: var(--shadow-lg); }
        .card:active { transform: scale(0.96); }
        
        .card-image { width: 100%; height: 200px; object-fit: cover; border-radius: 16px; margin-bottom: 20px; background-color: var(--bg-color); }
        .card-type { font-size: 12px; font-weight: 800; padding: 6px 12px; border-radius: 12px; display: inline-block; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.5px;}
        .card-content { font-size: 17px; line-height: 1.6; font-weight: 500; margin-bottom: 24px; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; font-size: 14px; color: var(--text-sub); font-weight: 600; }
        .counter { background-color: var(--bg-color); padding: 6px 12px; border-radius: 12px; color: var(--text-main); }
        .date-stamp { font-size: 12px; font-weight: 500; opacity: 0.7; }

        /* --- NEW: Delete Button Styling --- */
        .delete-btn {
            position: absolute; top: 20px; right: 20px;
            width: 36px; height: 36px; border-radius: 18px; border: none;
            background: rgba(255, 59, 48, 0.1); color: var(--danger);
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; opacity: 0.8; transition: all 0.2s ease; z-index: 10;
        }
        .delete-btn:hover { background: var(--danger); color: white; opacity: 1; transform: scale(1.1); }
        @media (hover: hover) { .card .delete-btn { opacity: 0; } .card:hover .delete-btn { opacity: 1; } }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--modal-overlay); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: var(--card-bg); padding: 32px; border-radius: 32px; width: 90%; max-width: 380px; box-shadow: var(--shadow-lg); border: 1px solid var(--border-color); text-align: center; }
        .modal-title { font-size: 22px; font-weight: 800; margin-bottom: 10px; letter-spacing: -0.5px;}
        .modal-select, .modal-input { width: 100%; padding: 14px; border-radius: 16px; border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-main); font-size: 16px; margin-bottom: 20px; box-sizing: border-box; outline: none; font-weight: 600;}
        .modal-buttons { display: flex; gap: 12px; margin-top: 10px; }
        .modal-btn { flex: 1; padding: 14px; border-radius: 16px; border: none; font-size: 16px; font-weight: 700; cursor: pointer; }
        .btn-cancel { background: var(--bg-color); color: var(--text-main); }
        .btn-confirm { background: var(--accent); color: var(--bg-color); }

        .global-loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--modal-overlay); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; color: var(--text-main); }
        .spinner { width: 48px; height: 48px; border: 4px solid var(--border-color); border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s cubic-bezier(0.6, 0.2, 0.4, 0.8) infinite; margin-bottom: 24px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loader-text { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
    </style>
</head>
<body>

    <div class="global-loader" id="globalLoader">
        <div class="spinner"></div>
        <div class="loader-text" id="loaderText">Loading...</div>
    </div>

    <div class="header-container">
        <h1>Bookmarks</h1>
        <input type="text" id="searchInput" class="search-bar" placeholder="Search ideas, authors, or content...">
        <div>
            <input type="file" id="fileUpload" accept=".json" style="display: none;">
            <button onclick="document.getElementById('fileUpload').click()" 
                    style="background: var(--accent); color: var(--bg-color); border: none; padding: 12px 24px; border-radius: 20px; font-size: 16px; font-weight: 800; cursor: pointer; box-shadow: var(--shadow-sm);">
                + Upload JSON
            </button>
        </div>
    </div>

    <div class="featured-container" id="featuredContainer" style="display: none;">
        <div class="featured-title">Rediscover</div>
        <a href="#" class="featured-card" id="featuredCard" target="_blank">
            <div class="featured-author" id="featuredAuthor">Author</div>
            <div class="featured-content" id="featuredContent">Content</div>
        </a>
    </div>

    <div class="tabs-container" id="tabsContainer"></div>

    <div class="toolbar">
        <div class="tool-group">
            <span class="tool-label">Filter Date:</span>
            <input type="date" id="startDate" class="tool-input">
            <span style="font-weight: 600; color: var(--text-sub);">to</span>
            <input type="date" id="endDate" class="tool-input">
        </div>
        <div class="tool-group">
            <span class="tool-label">Sort:</span>
            <select id="sortSelect" class="tool-select">
                <option value="newest">Newest First</option>
                <option value="oldest">Oldest First</option>
                <option value="clicksDesc">Most Clicks</option>
                <option value="clicksAsc">Least Clicks</option>
            </select>
        </div>
    </div>

    <div class="grid" id="bookmarksGrid"></div>

    <div class="modal-overlay" id="uploadModal">
        <div class="modal-content">
            <div class="modal-title">Select Category</div>
            <p style="font-size: 15px; color: var(--text-sub); margin-top: 0; margin-bottom: 24px; font-weight: 500;" id="modalSubtitle">Found items.</p>
            <select id="categorySelect" class="modal-select">
                <option value="NEW">-- Create New Category --</option>
            </select>
            <input type="text" id="newCategoryInput" class="modal-input" placeholder="Enter new category name...">
            <div class="modal-buttons">
                <button class="modal-btn btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="modal-btn btn-confirm" id="confirmUploadBtn">Upload</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbz0IbRtw2CyBlZaerVK__ZYHbR3aeZd9BvwQREKReIVMxELrbVIbrxR5dn2EJHjj2CU/exec";
        let allBookmarks = [];
        let fuse; 
        let pendingUploadData = null; 
        let activeCategory = 'All';
        const categoryColors = ['#FF2D55', '#5856D6', '#FF9500', '#34C759', '#007AFF', '#AF52DE', '#FF3B30'];
        const colorMap = {}; 

        function showLoader(message) {
            document.getElementById('loaderText').innerText = message;
            document.getElementById('globalLoader').style.display = 'flex';
        }
        function hideLoader() { document.getElementById('globalLoader').style.display = 'none'; }

        async function fetchBookmarks() {
            showLoader("Fetching your bookmarks...");
            try {
                const response = await fetch(API_URL);
                allBookmarks = await response.json();
                const options = { keys: ['Content', 'Author', 'Category'], threshold: 0.3 };
                fuse = new Fuse(allBookmarks, options);
                if (allBookmarks.length > 0) {
                    setFeaturedCard(); assignColors(); renderTabs();
                }
                filterAndRender();
            } catch (error) { 
                console.error("Error fetching data:", error); 
                alert("Failed to fetch bookmarks.");
            } finally {
                hideLoader();
            }
        }

        // --- NEW: Delete Logic ---
        async function deleteBookmark(id) {
            showLoader("Deleting bookmark...");
            try {
                await fetch(API_URL, {
                    method: 'POST', mode: 'no-cors',
                    body: JSON.stringify({ action: 'deleteBookmark', id: id })
                });
                // Small delay to let Google Sheets delete the row before we fetch again
                await new Promise(r => setTimeout(r, 500)); 
            } catch (error) { console.error("Delete failed", error); }
            
            fetchBookmarks(); 
        }

        function assignColors() {
            const categories = [...new Set(allBookmarks.map(b => b.Category).filter(Boolean))];
            categories.forEach((cat, index) => { colorMap[cat] = categoryColors[index % categoryColors.length]; });
        }

        function renderTabs() {
            const tabsContainer = document.getElementById('tabsContainer');
            tabsContainer.innerHTML = '';
            const categories = ['All', ...new Set(allBookmarks.map(b => b.Category).filter(Boolean))];
            
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `tab-btn`;
                btn.innerText = cat;
                if (cat === activeCategory) {
                    btn.style.background = cat === 'All' ? 'var(--accent)' : colorMap[cat];
                    btn.style.color = cat === 'All' ? 'var(--bg-color)' : 'white';
                    btn.style.borderColor = btn.style.background;
                }
                btn.onclick = () => { activeCategory = cat; renderTabs(); filterAndRender(); };
                tabsContainer.appendChild(btn);
            });
        }

        function filterAndRender() {
            const query = document.getElementById('searchInput').value;
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const sortBy = document.getElementById('sortSelect').value;

            let data = allBookmarks;
            if (query !== '') { data = fuse.search(query).map(result => result.item); }
            if (activeCategory !== 'All') { data = data.filter(b => b.Category === activeCategory); }
            if (startDate) { const start = new Date(startDate); data = data.filter(b => new Date(b.Date) >= start); }
            if (endDate) { const end = new Date(endDate); end.setHours(23, 59, 59, 999); data = data.filter(b => new Date(b.Date) <= end); }

            data.sort((a, b) => {
                const dateA = new Date(a.Date).getTime() || 0;
                const dateB = new Date(b.Date).getTime() || 0;
                const clicksA = parseInt(a.Clicks) || 0;
                const clicksB = parseInt(b.Clicks) || 0;
                switch(sortBy) {
                    case 'newest': return dateB - dateA;
                    case 'oldest': return dateA - dateB;
                    case 'clicksDesc': return clicksB - clicksA;
                    case 'clicksAsc': return clicksA - clicksB;
                    default: return 0;
                }
            });
            renderGrid(data);
        }

        document.getElementById('searchInput').addEventListener('input', filterAndRender);
        document.getElementById('startDate').addEventListener('change', filterAndRender);
        document.getElementById('endDate').addEventListener('change', filterAndRender);
        document.getElementById('sortSelect').addEventListener('change', filterAndRender);

        function setFeaturedCard() {
            const container = document.getElementById('featuredContainer');
            const card = document.getElementById('featuredCard');
            const randomItem = allBookmarks[Math.floor(Math.random() * allBookmarks.length)];
            
            document.getElementById('featuredAuthor').innerText = randomItem.Author || 'Unknown';
            document.getElementById('featuredContent').innerText = randomItem.Content || '';
            card.href = randomItem.URL;
            card.onclick = () => { fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'incrementClick', id: randomItem.ID }) }); };
            container.style.display = 'block';
        }

        function renderGrid(dataToRender) {
            const grid = document.getElementById('bookmarksGrid');
            grid.innerHTML = ''; 

            dataToRender.forEach(item => {
                const card = document.createElement('div'); // Changed from 'a' to 'div'
                card.className = 'card';
                
                // Handle the card click opening the URL
                card.onclick = () => {
                    handleTap(item.ID, card.querySelector('.counter'));
                    window.open(item.URL, '_blank');
                };

                const imageHtml = item.Thumbnail ? `<img src="${item.Thumbnail}" class="card-image" loading="lazy" alt="Media">` : '';
                const dateObj = new Date(item.Date);
                const dateString = isNaN(dateObj) ? 'No Date' : dateObj.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
                const catColor = colorMap[item.Category] || 'var(--accent)';

                card.innerHTML = `
                    <button class="delete-btn" aria-label="Delete Bookmark">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                    </button>
                    <div>
                        <div class="card-type" style="background-color: ${catColor}20; color: ${catColor};">${item.Category || 'Unknown'}</div>
                        ${imageHtml}
                        <div class="card-content">${item.Content || 'No content available'}</div>
                    </div>
                    <div>
                        <div class="card-footer" style="margin-bottom: 10px;">
                            <span>${item.Author || 'Unknown'}</span>
                            <span class="counter">${item.Clicks || 0} clicks</span>
                        </div>
                        <div class="date-stamp">${dateString}</div>
                    </div>
                `;
                
                // Wire up the delete button explicitly
                const deleteBtn = card.querySelector('.delete-btn');
                deleteBtn.onclick = (e) => {
                    e.stopPropagation(); // Prevents the card's onclick from triggering!
                    if(confirm("Are you sure you want to delete this bookmark forever?")) {
                        deleteBookmark(item.ID);
                    }
                };

                grid.appendChild(card);
            });
        }

        function handleTap(id, counterElement) {
            let currentClicks = parseInt(counterElement.innerText);
            counterElement.innerText = `${currentClicks + 1} clicks`;
            fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'incrementClick', id: id }) });
        }

        const modal = document.getElementById('uploadModal');
        const select = document.getElementById('categorySelect');
        const input = document.getElementById('newCategoryInput');

        select.addEventListener('change', (e) => { input.style.display = e.target.value === 'NEW' ? 'block' : 'none'; });

        function closeModal() {
            modal.style.display = 'none';
            document.getElementById('fileUpload').value = ''; 
            document.getElementById('newCategoryInput').value = '';
            document.getElementById('categorySelect').value = 'NEW';
            pendingUploadData = null;
        }

        document.getElementById('fileUpload').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    pendingUploadData = JSON.parse(e.target.result);
                    document.getElementById('modalSubtitle').innerText = `Found ${pendingUploadData.length} bookmarks.`;
                    
                    select.innerHTML = '<option value="NEW">-- Create New Category --</option>';
                    const existingCats = [...new Set(allBookmarks.map(b => b.Category).filter(Boolean))];
                    existingCats.forEach(cat => { select.innerHTML += `<option value="${cat}">${cat}</option>`; });
                    
                    input.style.display = 'block'; 
                    modal.style.display = 'flex';

                } catch (error) { alert("Error reading file."); }
            };
            reader.readAsText(file);
        });

        document.getElementById('confirmUploadBtn').addEventListener('click', async () => {
            let finalCategory = select.value === 'NEW' ? input.value.trim() : select.value;
            if (!finalCategory) { alert("Please select or enter a category name."); return; }

            const mappedBookmarks = pendingUploadData.map(tweet => {
                let thumb = '';
                if (tweet.media && tweet.media.length > 0 && tweet.media[0].type === 'photo') { thumb = tweet.media[0].original; }
                return {
                    id: tweet.id, category: finalCategory, author: tweet.name,
                    content: tweet.full_text, url: tweet.url || `https://twitter.com/${tweet.screen_name}/status/${tweet.id}`,
                    thumbnail: thumb, date: tweet.created_at || new Date().toISOString()
                };
            });

            closeModal(); 
            showLoader("Uploading to Google Sheets..."); 

            try {
                await fetch(API_URL, {
                    method: 'POST', mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain' }, 
                    body: JSON.stringify({ action: 'addBookmarks', bookmarks: mappedBookmarks })
                });
                await new Promise(r => setTimeout(r, 500)); 
            } catch (error) { console.error("Upload failed", error); }

            fetchBookmarks(); 
        });

        fetchBookmarks();
    </script>
</body>
</html>
